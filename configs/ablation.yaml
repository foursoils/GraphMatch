ablation:

  # ===========================================================================
  # kg 消融实验：将三元组图以文本形式（Hard Prompt）注入 vLLM 进行零样本推理
  # 入口：ablation/kg/ablation_main.py  |  重试：ablation/kg/ablation_retry.py
  # ===========================================================================
  kg:
    data:
      # 数据根目录（相对于项目根目录）
      data_root: "../data"
      # 结果输出根目录（相对于项目根目录），各数据集结果保存在各自子目录下
      output_root: "../data"
      # 输出 parquet 文件名
      output_filename: "qwen3.5_4b_tk.parquet"
      # 需要处理的数据集列表（与 data/ 下子目录名一致）
      datasets:
        - AggreFact-CNN
        - AggreFact-XSum
        - COVID-Fact
        - ExpertQA
        - Reveal
        - SCIFACT
        # - minicheck
        - pubhealth
        - summeval

    model:
      max_new_tokens: 10240
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      repetition_penalty: 1.3
      enable_thinking: true

    inference:
      # vLLM 参数
      vllm_model_path: "../models/llms/Qwen3.5-4B"
      vllm_gpu_memory_utilization: 0.92
      vllm_tensor_parallel_size: 1
      vllm_max_model_len: 40960
      vllm_max_num_seqs: 256          # vLLM 允许的最大并发数（控制每批次处理的最大序列数）
      vllm_enable_chunked_prefill: true
      test_limit: 0

  # ===========================================================================
  # check 消融实验：GNN 编码图结构 + 冻结 LLM，对齐后联合推理（Soft Prompt）
  # 训练入口：ablation/check/check_train.py
  # 推理入口：ablation/check/check_infer.py
  # ===========================================================================
  check:
    data:
      # 直接指定训练集和验证集的 parquet 文件路径（相对于项目根目录）
      train_file: "../data/minicheck/data_with_graph/gemma_26b_tk/train.parquet"
      val_file: "../data/minicheck/data_with_graph/gemma_26b_tk/val.parquet"
      data_root: "../data"
      output_root: "../data"
      output_filename: "graphcheck_infer.parquet"
      datasets:
        - AggreFact-CNN
        - AggreFact-XSum
        - COVID-Fact
        - ExpertQA
        - Reveal
        - SCIFACT
        # - minicheck
        - pubhealth
        - summeval

    model:
      # 冻结 LLM 的本地路径（相对于项目根目录）
      llm_model_path: "../models/llms/Qwen3.5-4B"
      # 用于将 JSON 三元组字符串转换为 Tensor 的 Embedding 模型路径
      embed_model_path: "../models/embeddings/Qwen3-Embedding-0.6B"
      max_txt_len: 1024      # 文本 token 截断长度 (原版: 1024)
      max_new_tokens: 5      # 推理时最大生成 token 数 (原版: 5)

    gnn:
      model_name: "gat"      # 可选: gt (GraphTransformer) | gat (GAT)，原版默认 gat
      in_dim: 1024           # 节点/边特征维度
      hidden_dim: 1024       # GNN 隐层维度
      num_layers: 3          # 原版: 3
      num_heads: 4           # 原版: 4
      dropout: 0.3           # 原版: 0.3

    training:
      seed: 0                # 原版: 0
      num_epochs: 20         # 原版: 20
      batch_size: 8          # 原版: 8
      eval_batch_size: 8     # 原版: 8
      num_workers: 4         # 新增: 数据加载多进程数量
      tensor_parallel_size: 1 # 新增: 内置多卡进程数量（1表示单卡，>1表示自动多卡DDP）
      lr: 1.0e-5             # 原版: 1e-5
      weight_decay: 0.05     # 原版: 0.05
      grad_steps: 2          # 梯度累积步数 (原版: 2)
      warmup_epochs: 2       # 原版: 2
      patience: 3            # Early Stopping 耐心轮数
      # 检查点保存目录（相对于项目根目录）
      output_dir: "../models/graph_check"

    infer:
      batch_size: 16         # 原版: 6 -> 调整为 16 以加速推理
      num_workers: 4         # 新增: 数据加载多进程数量
      tensor_parallel_size: 1 # 新增: 内置多卡推理进程数（1表示单卡，>1表示自动多卡并行分发）
      test_limit: 0          # 测试模式：只处理前 N 条，0 表示全量

  # ===========================================================================
  # nli_ft 消融：纯文本 NLI 微调（w/o graph），对齐 graph_match_nli 数据与超参
  # 训练：ablation/nli_ft/train.py
  # 推理：ablation/nli_ft/evaluate.py
  # 结果写入各数据集 data/<name>/ablation_results/
  # ===========================================================================
  nli_ft:
    data:
      train_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/train.parquet"
      val_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/val.parquet"
      test_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/test.parquet"
      data_root: "../data"
      # 与 graph_match 的 our_results 区分，写入 ablation_results
      output_filename: "deberta_v3_large_ft.parquet"
      datasets:
        - AggreFact-CNN
        - AggreFact-XSum
        - ExpertQA
        - SCIFACT
        - Reveal
        - WiCE
        - LFQA
        - TofuEval-MediaSum
        - minicheck

    model:
      # MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli（3-class NLI）
      nli_model_path: "../models/nlis/deberta-v3-large"
      max_length: 512
      device: "cuda"
      # 冻结前 N 层 encoder（与 graph_match_nli 对齐，便于公平对比）
      freeze_nli_layers: 12

    inference:
      chunked: true
      chunk_size: 400
      chunk_batch_size: 12

    training:
      batch_size: 4
      val_batch_size: 16
      test_batch_size: 24
      accum_steps: 4
      tensor_parallel_size: 1
      learning_rate: 0.000005
      encoder_lr_ratio: 2       # encoder LR = learning_rate × ratio
      weight_decay: 0.05
      label_smoothing: 0.05
      warmup_ratio: 0.1
      num_epochs: 1
      patience: 2
      best_f1_path: "../models/nli_ft/best_f1.pt"
      seed: 42
ablation:

  # ===========================================================================
  # kg 消融实验：将三元组图以文本形式（Hard Prompt）注入 vLLM 进行零样本推理
  # 入口：ablation/kg/ablation_main.py  |  重试：ablation/kg/ablation_retry.py
  # ===========================================================================
  kg:
    data:
      # 数据根目录（相对于项目根目录）
      data_root: "../data"
      # 结果输出根目录（相对于项目根目录），各数据集结果保存在各自子目录下
      output_root: "../data"
      # 输出 parquet 文件名
      output_filename: "gemma_3_4b_kg.parquet"
      # 需要处理的数据集列表（与 data/ 下子目录名一致）
      datasets:
        - AggreFact-CNN
        - AggreFact-XSum
        - TofuEval-MediaSum
        - summeval
        - minicheck
        - ExpertQA
        - LFQA
        - SCIFACT
        - WiCE

    model:
      max_new_tokens: 2
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      repetition_penalty: 1.3
      enable_thinking: true

    inference:
      # vLLM 参数
      vllm_model_path: "../models/llms/gemma-3-4b-it"
      vllm_gpu_memory_utilization: 0.92
      vllm_tensor_parallel_size: 1
      vllm_max_model_len: 30000
      vllm_max_num_seqs: 96          # vLLM 允许的最大并发数（控制每批次处理的最大序列数）
      vllm_enable_chunked_prefill: true
      test_limit: 0

  # ===========================================================================
  # check 消融实验：GNN 编码图结构 + 冻结 LLM，对齐后联合推理（Soft Prompt）
  # 训练入口：ablation/check/check_train.py
  # 推理入口：ablation/check/check_infer.py
  # ===========================================================================
  check:
    data:
      # 直接指定训练集和验证集的 parquet 文件路径（相对于项目根目录）
      train_file: "../data/minicheck/data_with_graph/gemma_26b_tk/train.parquet"
      val_file: "../data/minicheck/data_with_graph/gemma_26b_tk/val.parquet"
      data_root: "../data"
      output_root: "../data"
      output_filename: "graphcheck_infer.parquet"
      datasets:
        - AggreFact-CNN
        - AggreFact-XSum
        - COVID-Fact
        - ExpertQA
        - Reveal
        - SCIFACT
        # - minicheck
        - pubhealth
        - summeval

    model:
      # 冻结 LLM 的本地路径（相对于项目根目录）
      llm_model_path: "../models/llms/Qwen3.5-4B"
      # 用于将 JSON 三元组字符串转换为 Tensor 的 Embedding 模型路径
      embed_model_path: "../models/embeddings/Qwen3-Embedding-0.6B"
      max_txt_len: 1024      # 文本 token 截断长度 (原版: 1024)
      max_new_tokens: 5      # 推理时最大生成 token 数 (原版: 5)

    gnn:
      model_name: "gat"      # 可选: gt (GraphTransformer) | gat (GAT)，原版默认 gat
      in_dim: 1024           # 节点/边特征维度
      hidden_dim: 1024       # GNN 隐层维度
      num_layers: 3          # 原版: 3
      num_heads: 4           # 原版: 4
      dropout: 0.3           # 原版: 0.3

    training:
      seed: 0                # 原版: 0
      num_epochs: 20         # 原版: 20
      batch_size: 8          # 原版: 8
      eval_batch_size: 8     # 原版: 8
      num_workers: 4         # 新增: 数据加载多进程数量
      tensor_parallel_size: 1 # 新增: 内置多卡进程数量（1表示单卡，>1表示自动多卡DDP）
      lr: 1.0e-5             # 原版: 1e-5
      weight_decay: 0.05     # 原版: 0.05
      grad_steps: 2          # 梯度累积步数 (原版: 2)
      warmup_epochs: 2       # 原版: 2
      patience: 3            # Early Stopping 耐心轮数
      # 检查点保存目录（相对于项目根目录）
      output_dir: "../models/graph_check"

    infer:
      batch_size: 16         # 原版: 6 -> 调整为 16 以加速推理
      num_workers: 4         # 新增: 数据加载多进程数量
      tensor_parallel_size: 1 # 新增: 内置多卡推理进程数（1表示单卡，>1表示自动多卡并行分发）
      test_limit: 0          # 测试模式：只处理前 N 条，0 表示全量

  # ===========================================================================
  # ft 消融实验：纯文本 LoRA 微调 Qwen3-4B（无图），作为 GraphMatch 文本基线
  # 训练入口：ablation/ft/train.py
  # 推理入口：ablation/ft/evaluate.py
  # ===========================================================================
  ft:
    data:
      train_file: "../data/minicheck/processed_data/train.parquet"
      val_file: "../data/minicheck/processed_data/val.parquet"
      test_file: "../data/minicheck/processed_data/test.parquet"
      data_root: "../data"
      output_filename: "gemma_3_4b_ft.parquet"
      datasets:
        - AggreFact-CNN
        - AggreFact-XSum
        - TofuEval-MediaSum
        - summeval
        - minicheck
        - ExpertQA
        - LFQA
        - SCIFACT
        - WiCE

    model:
      llm_model_path: "../models/llms/gemma-3-4b-it"
      attn_implementation: "sdpa"
      system_prompt_path: "../prompts/hallu_detect/system_prompt.txt"
      user_prompt_path: "../prompts/hallu_detect/user_prompt.txt"
      max_txt_len: 30000
      max_new_tokens: 2

    lora:
      r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      target_modules:
        - "q_proj"
        - "k_proj"
        - "v_proj"
        - "o_proj"

    training:
      gpu_ids: "0"
      mixed_precision: "bf16"
      seed: 42
      num_epochs: 2
      batch_size: 1
      eval_batch_size: 4
      grad_accum_steps: 16
      num_workers: 2
      lr: 3.0e-6
      weight_decay: 0.0
      warmup_ratio: 0.1
      patience: 3
      output_dir: "../models/ft_gemma"
      log_dir: "../log/ft_gemma"
      val_sample: false
      val_sample_size: 300

    infer:
      gpu_ids: "0"
      batch_size: 1
      num_workers: 1
      test_limit: 0


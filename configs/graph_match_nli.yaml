nli_graph:
  data:
    train_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/train.parquet"
    val_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/val.parquet"
    test_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/test.parquet"
    data_root: "../data"
    output_filename: "roberta-large-mnli.parquet"
    datasets:
      - AggreFact-CNN
      - AggreFact-XSum
      - ExpertQA
      - SCIFACT
      - Reveal
      - WiCE
      - LFQA
      - TofuEval-MediaSum
      - minicheck

  model:
    # NLI 编码器：FacebookAI/roberta-large-mnli（RoBERTa-large，3-class NLI，MIT 许可）
    # id2label: 0=CONTRADICTION, 1=NEUTRAL, 2=ENTAILMENT；仅在 MNLI 上微调，
    # 不含 FEVER/ANLI/MiniCheck 监督，用作与 MiniCheck 对比方法完全独立的初始化。
    # 训练时 label_spec 自动解析：entailment_id=2（支持），hallucination_id=0（contradiction，即幻觉）
    nli_model_path: "../models/nlis/roberta-large-mnli"
    # 节点 Embedding 模型
    embedding_model_path: "../models/embeddings/Qwen3-Embedding-0.6B"
    device: "cuda"

    # 分类数：仅当 nli_model_path 为纯预训练 backbone 时生效；
    # 当前 roberta-large-mnli 是已微调分类 checkpoint，会以其 config.id2label 为准（3-class），此项被忽略
    num_labels: 3

    # RoBERTa-large 输入长度：max_position_embeddings=514（含 2 个特殊位置），
    # 有效可用序列长度为 512，不能超过
    max_length: 512

    # GMN 参数（v3：回归 v1 验证可行的 dim=256，避免 dim=512 训练不动 + 容量过剩）
    node_input_dim: 1024
    node_hidden_dim: 512
    num_prop_layers: 3

    # 图信息注入位置（RoBERTa-large 共 24 层，与 DeBERTa-v3-large 层数一致，取中间偏后）
    inject_layer_k: 12

    # Cross-Attention 头数（需整除 hidden_size=1024，与 DeBERTa-v3-large 相同）
    num_heads: 8

    # 冻结前 12 层 RoBERTa：只训后 12 层 + 分类头，保留 MNLI 阶段学到的通用语言/推理能力
    freeze_nli_layers: 12

    # 强 dropout
    dropout: 0.3

  # 推理专属配置：仅在 evaluate.py 中生效，不影响训练流程
  inference:
    # 是否启用长文档分块推理（对齐 MiniCheck 的 chunk + max 聚合策略）：
    #   doc 按句切成多个 ~chunk_size token 的块，每块与 claim 独立打分，
    #   取所有块中的最大支持概率作为该样本的最终预测。
    #   claim/doc 三元组图不切分，所有 chunk 共享同一张图。
    chunked: true
    # 每个 chunk 的目标 token 数（不含 claim 部分），与 max_length 配合：
    #   chunk_size + claim 长度 + 特殊 token 应 <= max_length
    chunk_size: 400
    # 同一样本内，多个 chunk 一次前向的批大小（显存允许可调大）
    chunk_batch_size: 8

  training:
    batch_size: 4
    val_batch_size: 16 # 训练时验证 batch，可与训练分开设置以加速评估
    test_batch_size: 24 # 测试推理 batch（evaluate.py）
    accum_steps: 4
    tensor_parallel_size: 1 # 新增: 内置多卡进程数量（1表示单卡，>1表示自动多卡DDP，需要至少同等数量GPU）
    # GMN / Cross-Attention 注入层 / 图级投影 / 分类头都是随机初始化，用常规量级学习率从零学习
    learning_rate: 0.0001 # 1e-4，仅作用于上述新模块（对应 train.py 中的 "other_params"）
    # RoBERTa 编码器已在 MNLI 上收敛，需要更小 LR 微调，避免破坏其已学到的语言/推理能力：
    # encoder LR = learning_rate × encoder_lr_ratio = 1e-4 × 0.05 = 5e-6
    # 注：此前 deberta_lr_ratio=2 会让编码器 LR 高于新模块，与"编码器应更低 LR"的设计意图相反，此处已修正
    encoder_lr_ratio: 0.05
    weight_decay: 0.05 # L2 正则强化
    label_smoothing: 0.05 # 分类标签平滑，抑制模型过度自信
    warmup_ratio: 0.1 # cosine 调度前 10% steps 线性 warmup
    num_epochs: 3 # 按需求限定为 2~3 轮，cosine 调度按此总轮数计算衰减
    # 保存策略：按 Val F1 选最优；训练 log 写在同目录 train.log
    patience: 3 # 轮数已很少，patience 设为不小于 num_epochs，避免中途早停
    # 按 backbone 分子目录保存，避免与其他 NLI 编码器（如 deberta-v3-large）的检查点相互覆盖
    best_f1_path: "../models/graph_match/roberta_large_mnli/best_f1.pt"
    seed: 42

nli_graph:
  data:
    train_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/train.parquet"
    val_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/val.parquet"
    test_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/test.parquet"
    data_root: "../data"
    output_filename: "deberta-v3-large.parquet"
    datasets:
      - AggreFact-CNN
      - AggreFact-XSum
      - COVID-Fact
      - ExpertQA
      - SCIFACT
      - minicheck
      - pubhealth
      - summeval

  model:
    # NLI 编码器：目前是裸的 microsoft/deberta-v3-large 预训练 backbone（无分类头、无 id2label）
    # 分类头随机初始化，从零在下游数据上训练；标签约定固定为 1=support(entailment) / 0=hallucination
    nli_model_path: "../models/nlis/deberta-v3-large"
    # 节点 Embedding 模型
    embedding_model_path: "../models/embeddings/Qwen3-Embedding-0.6B"
    device: "cuda"

    # 分类数（当前仅支持二分类）；若 nli_model_path 换成已微调的分类 checkpoint 会被其自身 id2label 覆盖
    num_labels: 2

    # DeBERTa 输入长度：deberta-v3-large 的 max_position_embeddings=512，不能超过
    max_length: 1024

    # GMN 参数（v3：回归 v1 验证可行的 dim=256，避免 dim=512 训练不动 + 容量过剩）
    node_input_dim: 1024
    node_hidden_dim: 512
    num_prop_layers: 3

    # 图信息注入位置（large 共 24 层，取中间偏后）
    inject_layer_k: 12

    # Cross-Attention 头数（需整除 hidden_size=1024）
    num_heads: 8

    # 冻结前 16 层 DeBERTa：只训后 8 层 + 分类头
    freeze_nli_layers: 12

    # 强 dropout
    dropout: 0.3

  training:
    batch_size: 1
    accum_steps: 16
    tensor_parallel_size: 1 # 新增: 内置多卡进程数量（1表示单卡，>1表示自动多卡DDP，需要至少同等数量GPU）
    learning_rate: 0.000005 # 1e-5（large 模型略低于 base）
    deberta_lr_ratio: 2 # DeBERTa LR = 4e-6
    weight_decay: 0.05 # L2 正则强化
    label_smoothing: 0.05 # 分类标签平滑，抑制模型过度自信
    warmup_ratio: 0.1 # cosine 调度前 10% steps 线性 warmup
    num_epochs: 15 # cosine 调度配合：到末尾 LR 降到 ~0
    # 保存策略：按 Val F1 选最优；训练 log 写在同目录 train.log
    patience: 4 # 连续 4 epoch Val F1 不改善则停
    best_f1_path: "../models/graph_match/best_f1.pt"
    seed: 42

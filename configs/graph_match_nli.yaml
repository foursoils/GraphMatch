nli_graph:
  data:
    train_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/train.parquet"
    val_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/val.parquet"
    test_parquet: "../data/minicheck/data_with_graph/gemma_26b_tk/test.parquet"
    data_root: "../data"
    output_filename: "deberta-v3-large.parquet"
    datasets:
      - AggreFact-CNN
      - AggreFact-XSum
      - ExpertQA
      - SCIFACT
      - Reveal
      - WiCE
      - LFQA
      - TofuEval-MediaSum
      - minicheck

  model:
    # NLI 编码器：MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli（3-class NLI）
    # entailment / neutral / contradiction；训练时 1→entailment，0→contradiction
    nli_model_path: "../models/nlis/deberta-v3-large"
    # 节点 Embedding 模型
    embedding_model_path: "../models/embeddings/Qwen3-Embedding-0.6B"
    device: "cuda"

    # 分类数：仅当 nli_model_path 为纯预训练 backbone 时生效；
    # MoritzLaurer 等已微调 NLI checkpoint 会以其 config.id2label 为准（当前为 3-class）
    num_labels: 3

    # DeBERTa 输入长度：deberta-v3-large 的 max_position_embeddings=512，不能超过
    max_length: 512

    # GMN 参数（v3：回归 v1 验证可行的 dim=256，避免 dim=512 训练不动 + 容量过剩）
    node_input_dim: 1024
    node_hidden_dim: 512
    num_prop_layers: 3

    # 图信息注入位置（large 共 24 层，取中间偏后）
    inject_layer_k: 12

    # Cross-Attention 头数（需整除 hidden_size=1024）
    num_heads: 8

    # 冻结前 16 层 DeBERTa：只训后 8 层 + 分类头
    freeze_nli_layers: 12

    # 强 dropout
    dropout: 0.3

  # 推理专属配置：仅在 evaluate.py 中生效，不影响训练流程
  inference:
    # 是否启用长文档分块推理（对齐 MiniCheck 的 chunk + max 聚合策略）：
    #   doc 按句切成多个 ~chunk_size token 的块，每块与 claim 独立打分，
    #   取所有块中的最大支持概率作为该样本的最终预测。
    #   claim/doc 三元组图不切分，所有 chunk 共享同一张图。
    chunked: true
    # 每个 chunk 的目标 token 数（不含 claim 部分），与 max_length 配合：
    #   chunk_size + claim 长度 + 特殊 token 应 <= max_length
    chunk_size: 400
    # 同一样本内，多个 chunk 一次前向的批大小（显存允许可调大）
    chunk_batch_size: 8

  training:
    batch_size: 4
    val_batch_size: 16 # 训练时验证 batch，可与训练分开设置以加速评估
    test_batch_size: 24 # 测试推理 batch（evaluate.py）
    accum_steps: 4
    tensor_parallel_size: 1 # 新增: 内置多卡进程数量（1表示单卡，>1表示自动多卡DDP，需要至少同等数量GPU）
    learning_rate: 0.000005 # 1e-5（large 模型略低于 base）
    deberta_lr_ratio: 2 # DeBERTa LR = 4e-6
    weight_decay: 0.05 # L2 正则强化
    label_smoothing: 0.05 # 分类标签平滑，抑制模型过度自信
    warmup_ratio: 0.1 # cosine 调度前 10% steps 线性 warmup
    num_epochs: 15 # cosine 调度配合：到末尾 LR 降到 ~0
    # 保存策略：按 Val F1 选最优；训练 log 写在同目录 train.log
    patience: 4 # 连续 4 epoch Val F1 不改善则停
    best_f1_path: "../models/graph_match/best_f1.pt"
    seed: 42

cot_gen:
  data:
    # 数据根目录（相对于项目根目录）
    data_root: "../data"
    # 结果输出根目录（相对于项目根目录），各数据集结果保存在其自身的 data_with_cot 子目录下
    output_root: "../data"
    # 输出 parquet 文件名
    output_filename: "gemma4_31b_tk.parquet"
    # 需要处理的数据集列表
    datasets:
      # - AggreFact-CNN
      # - AggreFact-XSum
      # - COVID-Fact
      # - ExpertQA
      # - Reveal
      # - SCIFACT
      - minicheck
      # - pubhealth
      # - summeval

  model:
    max_new_tokens: 10240
    temperature: 0.6
    top_p: 0.95
    top_k: 20
    repetition_penalty: 1.3
    enable_thinking: true

  inference:
    # 推理引擎类型: "vllm" (本地部署) 或 "api" (在线 API 或 OpenAI 兼容服务)
    engine_type: "vllm"

    # 1. vLLM 本地模型路径（相对于项目根目录，在代码中会自动转换为绝对路径）
    vllm_model_path: "../models/llms/gemma-4-31B-it"
    vllm_gpu_memory_utilization: 0.90
    vllm_tensor_parallel_size: 1
    vllm_max_model_len: 40960
    vllm_max_num_seqs: 256            # vLLM 允许的最大并发数（控制每批次处理的最大序列数）
    vllm_enable_chunked_prefill: true

    # 2. API 引擎配置 (当 engine_type 为 "api" 时生效)
    api:
      api_base_url: "http://localhost:8000/v1"
      api_key: "EMPTY"
      api_model_name: "gemma-4-31B-it"
      api_max_workers: 8
      save_every_n_items: 100

    test_limit: 0

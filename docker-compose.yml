services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm_api_server
    ports:
      - "8000:8000"
    volumes:
      # 将当前目录下的 models 文件夹挂载到容器内的 /models
      - ./models:/models
    ipc: host  # vLLM 等高优推理框架推荐开启的底层通信配置
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model /models/llms/Qwen3.5-4B
      --served-model-name Qwen3.5-4B
      --dtype bfloat16
      --trust-remote-code
      --max-model-len 12288
